appId: com.sima.ceh
---
# click button Try again
- assertVisible: Try Again
- tapOn: Try Again

- repeat:
    times: 5
    commands:
      - runScript: ../Daily/randomQuestion.js
      - scrollUntilVisible:
          element:
            id: "mst-Answer.*"
            index: ${output.choice}
          direction: DOWN
      - tapOn:
          id: "mst-Answer.*"
          index: ${output.choice}

      - tapOn: "Next"

# click icon Submit
- tapOn: icon-Submit
# popup Submit
- assertVisible: SUBMIT
- tapOn:
    text: Confirm

- runScript: ../ClosePopup/ClosePopup.yaml

# back về tab Tests
- tapOn: mst-Back

- runScript: ../ClosePopup/ClosePopup.yaml

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          text: "mst-Back"
          optional: true

- runScript: ../ClosePopup/ClosePopup.yaml
