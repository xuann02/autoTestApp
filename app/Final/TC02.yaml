appId: ${output.appId}
---
- launchApp
- tapOn: Tests

- swipe:
    direction: UP
# 1. Check Final
- assertVisible: Final Test
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"
# 1.1 App chia topic
- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true

      - tapOn:
          text: "Start"
          optional: true

- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: mst-Close
    optional: true
# 2. Màn game
- runFlow:
    commands:
      - repeat:
          while:
            notVisible: "Submit"
          commands:
            - runScript: ../Daily/randomQuestion.js
            - scrollUntilVisible:
                element:
                  id: "mst-Answer.*"
                  index: ${output.choice}
                direction: DOWN
            - tapOn:
                id: "mst-Answer.*"
                index: ${output.choice}

            - tapOn: "Next"
            - tapOn:
                text: "Start"
                optional: true

      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Dismiss

      # back lại màn Tests
      - tapOn: mst-Back
      - repeat:
          while:
            visible: "Final Tests"
          commands:
            - tapOn:
                text: "mst-Back"
                optional: true
    optional: true
