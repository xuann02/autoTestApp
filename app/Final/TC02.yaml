appId: com.sima.ceh
---
- launchApp
- tapOn: Tests

- swipe:
    direction: UP
# 1. Check Final
- assertVisible: Final Test
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"
# 1.1 App chia topic
- repeat:
    while:
      notVisible: "Final 1.*"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true

# 2. Màn game
- repeat:
    while:
      notVisible: "Submit"
    commands:
      - runScript: ../Daily/randomQuestion.js
      - scrollUntilVisible:
          element:
            id: "mst-Answer.*"
            index: ${output.choice}
          direction: DOWN
      - tapOn:
          id: "mst-Answer.*"
          index: ${output.choice}

      - tapOn: "Next"

# popup Submit
- assertVisible: SUBMIT
- tapOn:
    text: Dismiss
