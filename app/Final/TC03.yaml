appId: com.sima.ceh
---
# back lại màn Tests
- tapOn: mst-Back
- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          text: "mst-Back"
          optional: true

# Check hiển thị Final test khi chưa Submit
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true

# click icon Submit
- tapOn: icon-Submit
# popup Submit
- assertVisible: SUBMIT
- tapOn:
    text: Confirm

- runScript: ../ClosePopup/ClosePopup.yaml

# back về tab Tests
- tapOn: mst-Back
- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          text: "mst-Back"
          optional: true

# Có popup thì tắt đi
- runScript: ../ClosePopup/ClosePopup.yaml

#Check hiển thị Final test khi đã Submit
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true
