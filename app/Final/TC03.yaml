appId: ${output.appId}
---
- launchApp
- tapOn: Tests

- swipe:
    direction: UP

# Check hiển thị Final test khi chưa Submit
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true
      - tapOn:
          text: "Start"
          optional: true

- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: mst-Close
    optional: true

- runFlow:
    commands:
      # click icon Submit
      - tapOn: icon-Submit
      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Confirm

      - runFlow: ../ClosePopup/ClosePopup.yaml

      # back về tab Tests
      - tapOn: mst-Back
      - runFlow: ../ClosePopup/ClosePopup.yaml
      - repeat:
          while:
            visible: "Final Tests"
          commands:
            - tapOn:
                text: "mst-Back"
                optional: true

      # Có popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml

    optional: true
