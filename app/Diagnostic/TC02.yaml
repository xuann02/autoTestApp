appId: com.sima.asvab
---
- launchApp
- tapOn: Tests
#  Check hiển thị Diagnostic khi bắt đầu
- tapOn: |-
    Take our diagnostic test to assess your current level and get a personalized study plan.
    Start

# Làm màn game lần 1
- repeat:
    while:
      notVisible: "Confirm"
    commands:
      - runScript: ../Daily/randomQuestion.js
      - scrollUntilVisible:
          element:
            id: "mst-Answer.*"
            index: ${output.choice}
          direction: DOWN

      - tapOn:
          id: "mst-Answer.*"
          index: ${output.choice}

      # - assertVisible:
      #     below: "Explanation:"

      - tapOn: "Continue"

# Popup Submit
- assertVisible: SUBMIT
- tapOn:
    text: Dismiss

# Back về màn Tests
- tapOn: mst-Back

- runFlow: ../ClosePopup/ClosePopup.yaml
