appId: ${output.appId}
---
# màn result
- assertVisible: "Game Over     "
# button review answers
- tapOn: Review Your Answers
# back về màn result
- tapOn: mst-Back

# button Play Again
- tapOn: Play Again
- repeat:
    while:
      notVisible: "Question 5"
    commands:
      - scrollUntilVisible:
          element:
            id: mst-Answer-Correct
          direction: DOWN
      - tapOn:
          id: mst-Answer-Correct

      - tapOn: "Next"

- tapOn:
    id: mst-Answer-Incorrect

- assertVisible: Result
- tapOn: mst-Back
# Nếu hiển thị popup thì tắt đi
- runFlow: ../ClosePopup/ClosePopup.yaml
