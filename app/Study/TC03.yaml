appId: com.sima.ceh
---
# 3.1 Click button Continue màn result
- tapOn: Continue
- repeat:
    times: 2
    commands:
      - scrollUntilVisible:
          element:
            id: "mst-Answer-Correct"
          direction: DOWN
      - tapOn:
          id: "mst-Answer-Correct"

      - tapOn: "Continue"

- tapOn: mst-Back
- runScript: ../ClosePopup/ClosePopup.yaml

- assertVisible: Theory
- tapOn: Continue

- repeat:
    while:
      notVisible: "Try Again"
    commands:
      - scrollUntilVisible:
          element:
            id: "mst-Answer-Correct"
          direction: DOWN
      - tapOn:
          id: "mst-Answer-Correct"
      - tapOn: "Continue"
