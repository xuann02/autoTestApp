appId: com.sima.asvab
---
- tapOn: Start
# 3. Màn game
- repeat:
    while:
      notVisible: "Submit"
    commands:
      - runScript: ../Daily/randomQuestion.js
      - scrollUntilVisible:
          element:
            id: "mst-Answer.*"
            index: ${output.choice}
          direction: DOWN
      - tapOn:
          id: "mst-Answer.*"
          index: ${output.choice}

      - tapOn: "Next"

# popup Submit
- tapOn:
    text: Dismiss

# Back lại màn Tests
- tapOn: mst-Back
