appId: ${output.appId}
---
- launchApp
- tapOn: Tests

- swipe:
    direction: UP

- tapOn:
    text: ".*Custom Test 1.*"

 # Check button New Test    
- assertVisible: Try Again
- tapOn:
          text: New Test
          optional: true

- tapOn: Start

- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: mst-Close
    optional: true

- runFlow:
    commands: 
      - repeat:
          times: 4
          commands:
            - runScript: ../Daily/randomQuestion.js
            - scrollUntilVisible:
                element:
                  id: "mst-Answer.*"
                  index: ${output.choice}
                direction: DOWN
            - tapOn:
                id: "mst-Answer.*"
                index: ${output.choice}

            - tapOn: "Next"

      # click icon Submit
      - tapOn: icon-Submit
      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Confirm

      - runFlow: ../ClosePopup/ClosePopup.yaml
