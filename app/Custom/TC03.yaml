appId: ${appId}
---
- launchApp
- tapOn: Tests

- swipe:
    direction: UP

- tapOn:
    text: ".*Custom Test 1.*"
- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: mst-Close
    optional: true

- runFlow:
    commands:
      # Check button Previous
      - repeat:
          while:
            visible: "Previous"
          commands:
            - tapOn: Previous

      # click icon Submit
      - tapOn: icon-Submit
      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Confirm
      # Có popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml
